services:
  test-db:
    image: postgres:15-alpine
    container_name: taskteam-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: taskteam_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d taskteam_test"]
      interval: 5s
      timeout: 5s
      retries: 5
