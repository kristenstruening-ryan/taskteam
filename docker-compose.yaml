services:
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: taskteam_dev

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://devuser:devpassword@db:5432/taskteam_dev"
    depends_on:
      - db

  # client:
  #   build: ./client
  #   ports:
  #     - "5173:5173"
